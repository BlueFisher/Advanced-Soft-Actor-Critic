default:
  base_config:
    env_type: GYM
    env_name: Humanoid-v5
    env_args:
      include_cinert_in_observation: false
      include_cvel_in_observation: false
      include_qfrc_actuator_in_observation: false
      include_cfrc_ext_in_observation: false

    max_step: -1
    n_envs: 10

  sac_config:
    seed: 42

    n_step: 10

    use_normalization: true # Whether using observation normalization

    tau: 0.9
    v_lambda: 0.99
    init_log_alpha: 0
